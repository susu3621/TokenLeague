services:
  web:
    build: .
    env_file:
      - .env
    restart: unless-stopped
    environment:
      MY_FLASK_SECRET_KEY: ${MY_FLASK_SECRET_KEY:-change-me}
      PORT: 5006
    ports:
      - "5006:5006"
  worker:
    build: .
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - web
    command:
      - bash
      - -lc
      - python3 /app/scripts/run_leaderboard_snapshot_worker.py
