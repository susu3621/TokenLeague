{% extends "base.html" %}

{% block title %}Login | {{ project_title }}{% endblock %}

{% block content %}
<section class="card" style="max-width: 440px; margin: 40px auto;">
    <h1 style="margin-top: 0;">TokenLeague</h1>
    <p class="muted">Track token usage across agent runs and compare ranked users over day, week, and all time.</p>
    {% if error %}
    <p style="color: #b42318;">{{ error }}</p>
    {% endif %}
    <form method="POST" class="stack">
        <div>
            <label for="username">Username</label>
            <input id="username" name="username" value="admin" required>
        </div>
        <div>
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required>
        </div>
        <button class="btn-primary" type="submit">Sign in</button>
    </form>
</section>
{% endblock %}
