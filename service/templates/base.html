<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ project_title }}{% endblock %}</title>
    <!-- Manus Style: Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Manus Color Palette - White, Gray, Black */
            --bg: #fafafa;
            --panel: #ffffff;
            --text: #111827;
            --muted: #6b7280;
            --border: #e5e7eb;
            --primary: #1f2937;
            --accent: #374151;

            /* Manus Typography */
            --font-serif: 'Libre Baskerville', Georgia, serif;
            --font-sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            margin: 0;
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
        }

        .shell {
            min-height: 100vh;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
        }

        .brand {
            font-weight: 700;
            text-decoration: none;
            color: var(--text);
        }

        .nav {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .nav a,
        .nav button {
            font: inherit;
            color: var(--muted);
            text-decoration: none;
            border: 1px solid var(--border);
            background: transparent;
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
        }

        .container {
            max-width: 1080px;
            margin: 0 auto;
            padding: 28px 20px 40px;
        }

        .hero-title {
            margin: 0;
            font-size: 2rem;
            font-family: var(--font-serif);
        }

        h1, h2, h3 {
            font-family: var(--font-serif);
        }

        .inline-form {
            display: inline;
            margin: 0;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .muted {
            color: var(--muted);
        }

        input,
        textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font: inherit;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .stack {
            display: grid;
            gap: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            text-align: left;
            padding: 10px 8px;
            border-bottom: 1px solid var(--border);
        }
    </style>
    {% block styles %}{% endblock %}
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <a class="brand" href="{{ url_for('leaderboard') if g.user else url_for('login') }}">{{ project_title }}</a>
            {% if g.user %}
            <div class="nav">
                <a href="{{ url_for('leaderboard') }}">Leaderboard</a>
                <a href="{{ url_for('settings') }}">Settings</a>
                <a href="{{ url_for('docs_page') }}">Docs</a>
                <a href="{{ url_for('api_list') }}">API</a>
                {% if session.get('role') == 'admin' %}
                <a href="{{ url_for('admin_users') }}">Admin Users</a>
                <a href="{{ url_for('admin_ldap') }}">LDAP</a>
                <a href="{{ url_for('admin_agents') }}">Agent Catalog</a>
                {% endif %}
                <form method="POST" action="{{ url_for('logout') }}" style="margin: 0;">
                    <button type="submit">Log out</button>
                </form>
            </div>
            {% endif %}
        </header>
        <main class="container">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
